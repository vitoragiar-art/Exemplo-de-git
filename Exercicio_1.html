<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de IMC</title>
</head>

<body>
  <!DOCTYPE html>
  <html lang="pt-br">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>

    <h1>Cálculo de IMC</h1>

    <form>

      <div>
        <label for="inPeso">Peso (kg):</label>
        <input type="number" id="inPeso" step="0.1" placeholder="Ex: 70.5" required> <br> <br>
      </div>

      <div>
        <label for="inAltura">Altura (m):</label>
        <input type="number" id="inAltura" step="0.01" placeholder="Ex: 1.75" required><br><br>
      </div>

      <div>
        <input type="submit" value="Calcular IMC">
      </div>

    </form>

    <h3 id="Resultado"></h3>
    <script src="js/CalculadoraIMC.js"></script>
  </body>

  </html>
